---
- name: Upgrade TalosOS on Cluster
  hosts: control-nodes
  serial: 1
  strategy: free
  gather_facts: false
  vars:
    talos_version: "v1.12.4"  # Set your desired Talos version here

  tasks:
    - name: Get Talos node version
      delegate_to: localhost
      register: version
      command: >
        talosctl version --nodes {{ hostvars[inventory_hostname].IP }} --short

    - name: Extract Talos server version
      delegate_to: localhost
      set_fact:
        talos_server_version: "{{ version.stdout | regex_search('Tag:\\s*(v[0-9.]+)', '\\1') | first }}"

    - name: Print Upgrading message
      delegate_to: localhost
      when: talos_server_version != talos_version
      debug:
        msg:
          - "Current version on {{ hostvars[inventory_hostname].IP }} is {{ talos_server_version }}"
          - "Upgrading {{ hostvars[inventory_hostname].IP }} to {{ talos_version }}"

    - name: Upgrade Talos nodes
      delegate_to: localhost
      when: talos_server_version != talos_version
      command: >
        talosctl upgrade
        --nodes {{ hostvars[inventory_hostname].IP }}
        --image ghcr.io/siderolabs/installer:{{ talos_version }}
        --preserve=true

    - name: Wait for upgraded nodes to become healthy
      delegate_to: localhost
      command: talosctl health --nodes {{ hostvars[inventory_hostname].IP }}
      register: health_check
      until: "'waiting for all k8s nodes to report schedulable: OK' in health_check.stderr_lines"
      retries: 10
      delay: 30
